name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build and publish surrogateshield
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/surrogateshield/

    steps:
      - name: Checkout python-lib branch
        uses: actions/checkout@v4
        with:
          # Your deploy-lib.yml already puts the library code here,
          # so pyproject.toml is at the root of this branch.
          ref: python-lib

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build
        run: python -m build

      - name: Validate package
        run: twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*